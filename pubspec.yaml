name: pesan_keranjang
description: Aplikasi pencatatan order kue cina berbasis Flutter Web.
publish_to: 'none'
version: 1.0.0+23

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  excel: ^4.0.6
  file_picker: ^8.1.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  shared_preferences: ^2.2.3
  package_info_plus: ^8.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  web:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
