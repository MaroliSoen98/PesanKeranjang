name: Build Flutter APK

# Pipeline ini akan berjalan setiap ada 'push' ke branch 'main'
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    # Menggunakan server Ubuntu terbaru dari GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repository-mu
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java (Dibutuhkan untuk build Android)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Mengunduh semua dependency Flutter
      - name: Get Dependencies
        run: flutter pub get

      # 5. Proses build APK
      - name: Build APK Release
        run: flutter build apk --release

      # 6. Mengunggah hasil APK supaya bisa kamu download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk