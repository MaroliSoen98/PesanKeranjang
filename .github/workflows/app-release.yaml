name: Build and Release Flutter APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # LANGKAH BARU: Sinkronisasi versi pubspec.yaml dengan github.run_number
      - name: Update Version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: 1.0.${{ github.run_number }}+${{ github.run_number }}/" pubspec.yaml

      # Langkah Build: Sekarang otomatis menggunakan versi dari pubspec yang sudah diupdate
      - name: Build APK Release
        run: flutter build apk --release --obfuscate --split-debug-info=./debug_info

      - name: Rename APK File
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/PesanKeranjang-v1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PesanKeranjang v1.0.${{ github.run_number }}
          body: "Rilis otomatis APK terbaru dari branch main versi 1.0.${{ github.run_number }}."
          files: build/app/outputs/flutter-apk/PesanKeranjang-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}